app: eventic
title: Eventic API agent context
summary: Agent-facing context for Eventic's ndesign dashboard, stable event routing, repository configuration routes, workflow APIs, and run/event streams.
kind: agent_context
source_format: agent_context
source_ref: .agent/api/eventic.yaml
version: "2026-06-17"
labels:
  - eventic
  - go
  - dashboard
  - stable-events
  - webhooks
  - workflow-engine
  - ndesign
content:
  purpose: >
    Eventic is a per-repository DAG workflow engine for provider webhooks and
    stable internal events. The client persists known repositories, stable event
    mappings, workflow definitions, workflow runs, and recent event state in
    SQLite, then exposes an ndesign web console for repository discovery, global
    workflow and event mapping configuration, repository workflow configuration,
    manual replay, and live run/event monitoring.
  source_documents:
    - README.md
    - docs/Workflows.md
    - client/state.go
    - client/stable_events.go
    - client/stable_event_store.go
    - client/stable_event_registry.go
    - client/provider_events.go
    - client/workflow_store.go
    - server/server.go
    - client/web.go
    - client/web_api.go
    - client/web_templates.go
    - client/templates/dashboard.html
    - client/templates/configuration.html
  workflows:
    - name: Navigate repositories
      steps:
        - Open `GET /` for the repository dashboard.
        - The left navigation has an organization selector and search input. It defaults to `nitecon` when present.
        - The repository list is populated from `GET /api/projects?org=ORG&search=QUERY&summary=1`.
        - Summary rows are sorted by `updated_at DESC`, then repository name descending for ties.
        - Left-clicking a repository navigates to `GET /{org}/{repo}`; it does not mutate a dashboard-local selected-repo variable.
        - Use the header `Configuration` link (`GET /global`) for global workflow and event mapping configuration; it is not grouped in the repository sidebar.
        - The top-right header shows the running client version from `client.Version` with `data-eventic-version`.
        - The active theme is server-rendered from the `eventic_theme` cookie. The theme toggle persists changes with `POST /api/theme` and payload `{theme:"light"|"dark"}`.
    - name: Configure repository workflows
      steps:
        - Open `GET /{org}/{repo}` for a server-rendered configuration page. Unknown repositories return 404.
        - Configuration pages preserve the same stable repository sidebar as the dashboard: organization selector, search, and repository links remain visible after clicking into one repository.
        - Configuration forms use top-label form groups consistently; checkbox controls should be rendered inside `.nd-form-group` with a `label for=...` above the input, not as side-by-side `.nd-checkbox` labels.
        - Existing workflows are loaded from `GET /api/workflow-config?scope=repo&repo={org}/{repo}`.
        - Create a workflow with `POST /api/workflow-config?scope=repo&repo={org}/{repo}`.
        - Update a workflow with `PUT /api/workflow-config/{id}`.
        - Delete a workflow with `DELETE /api/workflow-config/{id}`.
        - Append a typed step with `POST /api/workflow-config/{id}/steps`.
        - Update a typed step with `PUT /api/workflow-config/{id}/steps/{node_key}`.
        - Delete a typed step with `DELETE /api/workflow-config/{id}/steps/{node_key}`; the configuration endpoint maintains a simple success-edge chain for this editor path.
        - "`event_type` is selected from `GET /api/event-types` values, such as `artifact.initiate`, `security.alarm`, `push`, `pull_request.opened`, or `comms`."
        - The compatibility API still accepts a newline-delimited `steps` field where each line is either a shell command or `Display name | shell command`; those lines become sequential `run_command` nodes linked by success edges.
        - The typed config path accepts either `typed_steps` or a flat initial step on create. Supported `action_type` values are `run_command`, `send_http_request`, `send_project_message`, and `trigger_project_event`.
        - The configuration UI treats step names as optional implementation detail: create/append forms do not ask for a separate step name, and existing step labels are preserved through hidden fields. The action select progressively shows only fields relevant to the selected action, response mode, and post action.
        - HTTP steps use `http_method`, `http_url`, optional `http_headers`, optional `http_body`, and `result_statuses` (for example `200-299`).
        - Command steps use `command` and `result_exit_codes` (for example `0`).
        - Project message/event steps use `project_repo`, optional `project_ref`, `project_message`, and for trigger-event steps `project_event_type`.
        - Response handling uses `response_mode` (`noop`, `send_data`, `iterate_data`), optional dot-notation `response_path` (for example `body.items.0.name`), and `response_capture` when data should be stored for downstream conditions/steps.
        - Steps can define durable `post_actions` in `workflow_nodes.config`. The editor exposes the first post action through `post_action_type`, `post_command`, `post_http_*`, `post_project_*`, `post_result_*`, `post_continue_on_error`, and `post_timeout_seconds` fields.
        - For `send_data`, post actions run once with `${EVENTIC_RESPONSE_DATA}` set to the selected response data. For `iterate_data`, post actions run once per selected array item with `${EVENTIC_ITEM}` and `${EVENTIC_ITEM_INDEX}` set.
        - Post action types use the same typed action names as primary steps and are evaluated with the same status/exit matcher rules before the parent step is considered successful.
    - name: Configure global workflows
      steps:
        - Open `GET /global` for all-repository workflow defaults.
        - The global workflow page also preserves the stable repository sidebar and the same top-label form control pattern used by repository configuration pages.
        - Existing workflows are loaded from `GET /api/workflow-config?scope=global`.
        - Create global workflows with `POST /api/workflow-config?scope=global`.
        - Global workflow forms use the same selected `event_type`, typed step, result evaluation, and response handling contract as repository workflows.
    - name: Configure stable events
      steps:
        - Open `GET /global/events` for the stable internal event registry.
        - This page is for creating and editing stable event definitions only; it does not render workflow forms, provider event cards, drag/drop targets, or advanced mapping forms.
        - Stable events are loaded from `GET /api/stable-events`, created with `POST /api/stable-events`, updated with `PUT /api/stable-events/{id}`, and custom events are deleted with `DELETE /api/stable-events/{id}`. Built-in stable event keys cannot be renamed or deleted, but their display metadata can be edited.
    - name: Configure visual event mappings
      steps:
        - Open `GET /global/mappings` for the provider-to-stable-event drag/drop mapper.
        - The visual mapper shows provider events in the left column and grouped stable event drop targets in the right column; it does not render stable event edit forms, workflow forms, or advanced condition editors.
        - Provider palette rows are loaded from `GET /api/provider-events?provider=PROVIDER`; provider filter `all` returns the whole catalog.
        - Dropping a provider event onto a stable event creates a mapping through `POST /api/event-mappings`.
        - Mapping IDs for user-created mappings are generated server-side as UUID strings; visual mapper payloads should omit `mapping_id`.
    - name: Configure advanced event mappings
      steps:
        - Open `GET /global/mappings/advanced` for direct mapping CRUD and condition JSON editing.
        - This page is for advanced mapping configuration only; it does not render workflow forms, stable event creation/edit forms, or drag/drop provider cards.
        - Mappings are loaded from `GET /api/event-mappings`, created with `POST /api/event-mappings`, updated with `PUT /api/event-mappings/{id}`, and deleted with `DELETE /api/event-mappings/{id}`.
        - Mapping payloads use `provider`, `name`, `enabled`, `priority`, `conditions` or `conditions_text`, and `target_stable_event`. A provider value of `*` applies to every provider. Conditions can match `event`, `action`, `ref`, `repo`, `sender`, `headers.Name`, `metadata.name`, or `body.path` values, including glob values like `refs/tags/*` and array wildcards like `body.vulnerabilities[].severity`.
        - New mapping payloads should omit `mapping_id`; the server generates a UUID mapping ID. Update payloads may omit `mapping_id`, in which case the existing value is preserved.
        - Default mappings include `artifact.initiate`, `artifact.published`, `system.failure`, `security.alarm`, and `communication.received`.
        - Runtime workflow resolution uses `StableEvent` with no action suffix when normalization matched; otherwise it preserves legacy repo/action, repo/event, global/action, global/event precedence.
    - name: Ingest provider webhooks
      steps:
        - The public relay still accepts GitHub at `POST /webhook/github` with `X-Hub-Signature-256`.
        - The generic ingress path is `POST /v1/webhooks/{provider}`. `github` uses the same HMAC validation; non-GitHub providers use `Authorization: Bearer <token>` checked against `EVENTIC_COMMS_TOKENS` or `EVENTIC_CLIENT_TOKENS`.
        - Generic payloads must provide or expose a target `repo` (`org/repo`) so the relay can fan out to subscribed clients and the client can run a repository-scoped workflow.
        - GitLab, Bitbucket, Prometheus/Alertmanager, and custom payloads are parsed into `EventMsg.Provider`, `ExternalEvent`, `ExternalAction`, `Headers`, `Metadata`, and raw `Payload`; the client then applies stable event mappings.
        - Direct stable event ingress is `POST /event/{stable_event}` with Bearer-token auth. The JSON body must include `repo` and may include `ref`, `title`, `body`, `action`, `message`, `sender`, `clone_url`, and string metadata. The relay sets `EventMsg.StableEvent` to the path segment and bypasses provider mapping.
    - name: Use project and workflow APIs
      steps:
        - "`GET /api/projects` preserves the legacy string-array response for known repositories."
        - "`GET /api/projects?summary=1`, or any `org`/`search` query, returns `ProjectSummary` objects: `repo`, `owner`, `name`, `state`, `updated_at`."
        - "`GET /api/projects/{org}/{repo}` returns the latest `ProjectState` for that repository."
        - "`GET /api/workflows`, `POST /api/workflows`, `GET/PUT/DELETE /api/workflows/{id}` remain the raw DAG CRUD API and accept explicit nodes and edges."
        - "`POST /api/theme` sets an HttpOnly `eventic_theme` cookie for `light` or `dark`; dashboard and configuration templates inject the active stylesheet from that cookie."
        - "`GET /api/event-types` returns stable event keys plus GitHub webhook event/action references and Eventic's synthetic `comms` event."
        - "`GET /api/stable-events` returns stable event registry rows with id, event key, group, title, description, enabled, built_in, example sources, and workflow uses."
        - "`POST /api/stable-events`, `PUT /api/stable-events/{id}`, and `DELETE /api/stable-events/{id}` manage custom stable events. Deleting a custom stable event also removes mappings targeting that key."
        - "`GET /api/provider-events?provider=` returns provider-event palette rows with provider, event, action, label, description, and mapping conditions."
        - "`GET/POST /api/event-mappings` and `PUT/DELETE /api/event-mappings/{id}` are the local mapping registry API."
        - "`GET /api/runs?repo=ORG/REPO&limit=N` lists runs for one repo; omitting `repo` lists recent runs across repositories."
        - "`POST /api/runs` triggers a manual replay event with `repo`, `event_type`, `ref`, and optional `message`."
        - "`GET /ws/runs` streams WebSocket run updates for ndesign rows; `/api/runs/stream` and `/events/stream` are SSE fallbacks."
